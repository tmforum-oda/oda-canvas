name: Lint Python code
on: 
  pull_request:
    branches:
      - main
jobs:
  lint-python-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with: 
          src: |
            ./automation/generators/dockerbuild-workflow-generator
            ./source/operators/TMFO001-Component-Management/component-management
            ./source/operators/TMFO002-API-Management/istio
            ./source/operators/TMFO005-Dependency-Management/simple-dependency-management
            ./source/operators/TMFO007-Secrets-Management/vault
